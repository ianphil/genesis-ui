<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Open Chamber to install a Genesis marketplace."
    />
    <link rel="icon" type="image/svg+xml" href="assets/app.svg" />
    <title>Add Marketplace to Chamber</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111114;
        --muted: #62636f;
        --line: rgba(17, 17, 20, 0.14);
        --panel: rgba(255, 255, 255, 0.72);
        --violet: #7557df;
        --violet-dark: #6546cc;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 72% 0%, rgba(255, 255, 255, 0.94), transparent 19rem),
          radial-gradient(circle at 73% 46%, rgba(117, 87, 223, 0.18), transparent 13rem),
          linear-gradient(180deg, #f2f3f7 0%, #e7e8ee 100%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 36px));
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: 0 34px 90px rgba(45, 46, 58, 0.18);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: inline-flex;
        gap: 14px;
        align-items: center;
        margin-bottom: 44px;
        color: var(--ink);
        text-decoration: none;
      }

      .brand img {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        box-shadow: 0 0 0 7px rgba(117, 87, 223, 0.05);
      }

      .brand span {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.48em;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(34px, 6vw, 62px);
        font-weight: 300;
        line-height: 1.08;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      code {
        padding: 2px 5px;
        border-radius: 5px;
        background: rgba(17, 17, 20, 0.06);
        color: var(--ink);
        font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
        font-size: 0.92em;
      }

      .registry {
        overflow-wrap: anywhere;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        min-height: 47px;
        padding: 0 24px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(17, 17, 20, 0.24);
        border-radius: 6px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-transform: uppercase;
        cursor: pointer;
      }

      .button-primary {
        border-color: transparent;
        background: linear-gradient(135deg, var(--violet), var(--violet-dark));
        color: white;
        box-shadow: 0 20px 46px rgba(117, 87, 223, 0.26);
      }

      .error {
        color: var(--danger);
      }

      .fallback {
        margin-top: 26px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="brand" href="/" aria-label="Chamber home">
        <img src="assets/app.svg" alt="" />
        <span>CHAMBER</span>
      </a>

      <h1>Add marketplace</h1>
      <p id="status">Preparing to open Chamber...</p>
      <p id="registry" class="registry"></p>

      <div class="actions">
        <a id="openChamber" class="button button-primary" href="#">Open Chamber</a>
        <button id="copyLink" class="button" type="button">Copy install link</button>
      </div>

      <p class="fallback">
        If Chamber does not open, install Chamber first, then paste the install link into
        your browser address bar or use <code>Add Marketplace</code> in Chamber.
      </p>
    </main>

    <script>
      const statusElement = document.querySelector('#status');
      const registryElement = document.querySelector('#registry');
      const openChamberLink = document.querySelector('#openChamber');
      const copyLinkButton = document.querySelector('#copyLink');

      function getRegistryUrl() {
        const params = new URLSearchParams(window.location.search);
        const registry = params.get('registry');
        if (!registry) {
          throw new Error('Missing registry URL.');
        }

        const url = new URL(registry);
        if (url.protocol !== 'https:' || url.hostname !== 'github.com') {
          throw new Error('Registry must be a GitHub repository URL.');
        }

        const segments = url.pathname.split('/').filter(Boolean);
        if (segments.length < 2) {
          throw new Error('Registry URL must include an owner and repository.');
        }

        return `https://github.com/${segments[0]}/${segments[1].replace(/\.git$/, '')}`;
      }

      function openChamber(installUrl) {
        window.location.href = installUrl;
      }

      try {
        const registryUrl = getRegistryUrl();
        const installUrl = `chamber://install?registry=${encodeURIComponent(registryUrl)}`;
        registryElement.textContent = registryUrl;
        openChamberLink.href = installUrl;
        openChamberLink.addEventListener('click', () => openChamber(installUrl));
        copyLinkButton.addEventListener('click', async () => {
          await navigator.clipboard.writeText(installUrl);
          copyLinkButton.textContent = 'Copied';
        });
        window.setTimeout(() => openChamber(installUrl), 250);
      } catch (error) {
        statusElement.classList.add('error');
        statusElement.textContent = error instanceof Error ? error.message : String(error);
        openChamberLink.setAttribute('aria-disabled', 'true');
        openChamberLink.removeAttribute('href');
        copyLinkButton.disabled = true;
      }
    </script>
  </body>
</html>
